<!-- hello welcome to style.html, this file will explain you about whats the style attribute.

The style attribute is used to change the apperence of a text. It is a part of HTML but can also be used in CSS.

This code/web-example below is a example of using the style attribute -->

<html>
 <head style="color: brown;"> <!-- This changes the color of any text included in the head attribute. -->
    <h1 style="color: red; font-family: cursive; text-align: center;"> <!-- This changes the color and the font of any text included in h1-->
        Styling Attribute
    </h1>
</head>
<body>
    <p style="color: black; font-size: larger;"> <!-- this changes the color and the font-size of the text-->
        This is a styled text
    </p>
</body>
</html>
